name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quality:
    name: Lint, format & syntax
    runs-on: ubuntu-latest
    steps:
      - name: Check out code
        uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Install tooling
        run: pip install --quiet ruff nbformat

      - name: Lint for errors (blocking)
        run: ruff check --select E9,F63,F7,F82 --output-format=github .

      - name: Compile all Python
        run: |
          mapfile -t pyfiles < <(git ls-files '*.py')
          if [ ${#pyfiles[@]} -gt 0 ]; then
            python -m compileall -q "${pyfiles[@]}"
          else
            echo "No .py files to compile."
          fi

      - name: Validate notebooks
        run: |
          mapfile -t nbfiles < <(git ls-files '*.ipynb')
          if [ ${#nbfiles[@]} -eq 0 ]; then
            echo "No notebooks found."; exit 0
          fi
          for nb in "${nbfiles[@]}"; do
            if python -c "import nbformat; nbformat.read('$nb', as_version=4)"; then
              echo "ok   $nb"
            else
              echo "bad  $nb"; exit 1
            fi
          done

      - name: Style report (advisory, log only)
        run: |
          echo "::group::Full ruff lint (advisory)"
          ruff check --output-format=concise . || true
          echo "::endgroup::"
          echo "::group::Format check (advisory)"
          ruff format --check . || true
          echo "::endgroup::"
